<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon-Ops-Suite | Alessa Portfolio</title>
    <style>
        :root { --amz-orange: #ff9900; --amz-navy: #232f3e; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        header { background: var(--amz-navy); color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border-top: 5px solid var(--amz-orange); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; color: var(--amz-navy); font-size: 1.1rem; }
        /* Modal for Tool Logic */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; background: white; padding: 30px; border-radius: 15px; z-index: 100; text-align: center; }
        input, select { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: var(--amz-orange); border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<header>
    <h1>Amazon Operations Suite v1.0</h1>
    <p>Operational Excellence & Information Systems Dashboard</p>
</header>

<div class="grid" id="tool-grid"></div>

<div id="overlay" onclick="closeTool()"></div>
<div id="modal">
    <div id="modal-body"></div>
    <br><button onclick="closeTool()">Return to Dashboard</button>
</div>

<script>
const warehouseTools = [
    { 
        name: "Damaged Goods Reporter", 
        desc: "Log damaged items for quality control.",
        run: () => render(`
            <h3>Damage Report</h3>
            <input id="item" placeholder="Scan Item ID">
            <select id="cond"><option>Crushed</option><option>Liquid Leak</option></select>
            <button onclick="alert('Logged to LocalStorage!')">Submit Report</button>
        `)
    },
    { 
        name: "Pallet Location Tracker", 
        desc: "Check bin status in Section A-1.",
        run: () => render(`
            <h3>Section A-1 Status</h3>
            <div style="display:flex; gap:10px; justify-content:center;">
                <div style="background:red; padding:10px; color:white;">A1: FULL</div>
                <div style="background:green; padding:10px; color:white;">A2: EMPTY</div>
            </div>
        `)
    },
    { 
        name: "Restock Calculator", 
        desc: "Automated Reorder Point (ROP) logic.",
        run: () => {
            const rop = (60 * 4) + 15; // Sales * LeadTime + Buffer
            render(`<h3>Current ROP: ${rop} units</h3><p>Trigger order when stock hits this level.</p>`);
        }
    },
    { 
        name: "QR Label Generator", 
        desc: "Generate scannable IDs via API.",
        run: () => render(`<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=AMZ-UNIT-X"><h3>ID: AMZ-UNIT-X</h3>`)
    },
    { 
        name: "Aisle Heatmap", 
        desc: "Identify congestion in pick-paths.",
        run: () => render(`<div style="background:linear-gradient(to right, red, yellow); height:30px; width:100%; border-radius:15px;"></div><p>Aisle 7: <b>Critical Congestion</b></p>`)
    },
    { 
        name: "FIFO Age Monitor", 
        desc: "Detect inventory sitting over 30 days.",
        run: () => render(`<h3>⚠️ Warning</h3><p>Pallet 402: 42 Days Old<br>Action: Move to Outbound</p>`)
    },
    { 
        name: "Label Format Validator", 
        desc: "Regex verification for UPS/FedEx.",
        run: () => render(`
            <input id="track" placeholder="Enter Tracking #" oninput="checkTrack(this.value)">
            <p id="trackRes">Waiting for input...</p>
        `)
    },
    { 
        name: "Auto-Invoicer", 
        desc: "Draft procurement orders for low stock.",
        run: () => render(`<h3>Draft Invoice #882</h3><p>Item: Brownies (Dairy-Free)<br>Qty: 250 Units<br>Status: Awaiting Manager Approval</p>`)
    },
    { 
        name: "Dock Scheduler", 
        desc: "Truck arrival time-slot management.",
        run: () => render(`<h3>Today's Schedule</h3><p>09:00 - Truck A (Miami)<br>10:00 - <b>OPEN SLOT</b><br>11:00 - Truck C (Sunrise)</p>`)
    },
    { 
        name: "Box Size Recommender", 
        desc: "Optimize packaging to reduce waste.",
        run: () => render(`<h3>Recommender</h3><p>Input: 10" x 8" Item<br><b>Use Box: Size B (Standard)</b></p>`)
    }
];

function render(html) {
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

function closeTool() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

function checkTrack(val) {
    const res = document.getElementById('trackRes');
    if(val.startsWith("1Z")) res.innerHTML = "✅ UPS Validated";
    else if(val.length === 12) res.innerHTML = "✅ FedEx Validated";
    else res.innerHTML = "❌ Invalid Format";
}

// Populate Grid
const grid = document.getElementById('tool-grid');
warehouseTools.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${tool.name}</h3><p>${tool.desc}</p>`;
    card.onclick = tool.run;
    grid.appendChild(card);
});
</script>

</body>
</html>
